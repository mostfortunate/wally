# Wally classification rules — copy this to `classification.toml` and fill in your own.
#
#   cp classification.example.toml classification.toml
#
# `classification.toml` is gitignored so your merchant list stays off the remote.
#
# How matching works: each transaction's description is lowercased and reduced to only
# letters, digits, '#' and '$' (whitespace, punctuation, and stray glyphs are dropped),
# and so is every pattern below; a pattern matches if it's a substring of the description.
# Exclusions are checked first. If a description matches two different categories (or two
# exclusion reasons), that's a config error — disambiguate it.

[categories]
# <category> = ["substring", "substring", ...]
# The category names must match the ones in your wally.toml budget limits.
takeout   = ["tim hortons", "mcdonalds", "uber eats", "doordash"]
groceries = ["save on foods", "costco", "no frills"]
gas       = ["petro", "shell", "esso"]

[exclude]
# <reason> = ["substring", ...]   — matched lines are EXCLUDED (money moved, not spend)
#
# The CIBC card payment appears on TWO statements and must be excluded from both:
#   - On the CIBC statement: "Payment Thank You / Paiement Merci" (a credit to the card)
#   - On the RBC statement:  "Misc Payment CIBC CPD" (the debit that funds the payment)
# Counting both would double your spend, so both patterns exclude under the same reason.
"CIBC card payment" = ["payment thank you", "cibc cpd"]
